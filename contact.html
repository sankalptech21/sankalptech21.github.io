<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Sankalp Sinha</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        /* --- CORE STYLES & THEME VARIABLES (Matching Homepage) --- */
        :root {
            --bg-color: #050816;
            --text-color: #ffffff;
            --text-secondary: #dfd9ff;
            --accent-color: #915eff; 
            --card-bg: rgba(21, 16, 48, 0.85);
            --nav-bg: rgba(5, 8, 22, 0.9);
            --input-bg: rgba(0, 0, 0, 0.2);
        }

        [data-theme="light"] {
            --bg-color: #f3f3f3;
            --text-color: #1a1a1a;
            --text-secondary: #4a4a4a;
            --accent-color: #0078d4; 
            --card-bg: rgba(255, 255, 255, 0.9);
            --nav-bg: rgba(255, 255, 255, 0.9);
            --input-bg: rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: background-color 0.3s, color 0.3s; cursor: none; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }

        /* --- 3D CANVAS & CURSOR --- */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        .cursor-dot { width: 8px; height: 8px; background-color: var(--accent-color); position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); box-shadow: 0 0 10px var(--accent-color); }
        .cursor-outline { width: 40px; height: 40px; border: 2px solid var(--accent-color); position: fixed; border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: width 0.15s, height 0.15s; }
        @media (max-width: 768px) { .cursor-dot, .cursor-outline { display: none; } * { cursor: auto; } }

        /* --- NAVBAR --- */
        nav { position: fixed; top: 0; width: 100%; padding: 20px 50px; display: flex; align-items: center; justify-content: center; background: var(--nav-bg); backdrop-filter: blur(10px); z-index: 1000; }
        .logo { position: absolute; left: 50px; font-size: 22px; font-weight: 700; color: var(--text-color); text-decoration: none; display: flex; align-items: center; gap: 10px; z-index: 1001; }
        .logo span { color: var(--accent-color); }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 16px; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--text-color); }
        .active-link { color: var(--text-color) !important; border-bottom: 2px solid var(--accent-color); padding-bottom: 5px; }
        #theme-toggle { position: absolute; right: 50px; background: none; border: none; color: var(--text-color); font-size: 22px; cursor: pointer; z-index: 1001; }
        .hamburger { display: none; background: none; border: none; color: var(--text-color); font-size: 24px; cursor: pointer; position: absolute; right: 90px; z-index: 1001; }

        @media (max-width: 768px) {
            nav { padding: 15px 20px; justify-content: space-between; }
            .logo { left: 20px; font-size: 18px; }
            #theme-toggle { right: 20px; }
            .hamburger { display: block; right: 65px; }
            .nav-links { position: absolute; top: 100%; left: 0; width: 100%; background: var(--nav-bg); backdrop-filter: blur(15px); flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; transform: translateY(-150%); opacity: 0; transition: 0.4s ease-in-out; pointer-events: none; border-bottom: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
            .nav-links.active { transform: translateY(0); opacity: 1; pointer-events: auto; }
        }

        /* --- CONTACT PAGE STYLES --- */
        .page-wrapper { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 120px 20px 50px 20px; }
        
        .contact-container { 
            width: 100%; 
            max-width: 700px; 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.05); 
            padding: 50px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            backdrop-filter: blur(10px); 
        }

        .contact-header { text-align: center; margin-bottom: 40px; }
        .contact-header h1 { font-size: 45px; font-weight: 900; line-height: 1.2; margin-bottom: 10px; }
        .contact-header h1 span { color: var(--accent-color); }
        .contact-header p { color: var(--text-secondary); font-size: 16px; }

        /* Form Elements */
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-secondary); font-size: 14px; }
        
        input, textarea { 
            width: 100%; 
            padding: 15px 20px; 
            background: var(--input-bg); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: var(--text-color); 
            border-radius: 12px; 
            font-size: 15px; 
            outline: none; 
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }
        
        [data-theme="light"] input, [data-theme="light"] textarea { border: 1px solid rgba(0,0,0,0.1); }
        
        input:focus, textarea:focus { border-color: var(--accent-color); box-shadow: 0 0 15px rgba(145, 94, 255, 0.15); background: transparent; }
        
        button[type="submit"] { 
            width: 100%; 
            padding: 16px; 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 16px; 
            transition: 0.3s; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        
        button[type="submit"]:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(145, 94, 255, 0.4); 
        }

        /* Direct Contact Info */
        .contact-info-blocks { 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            margin-top: 40px; 
            padding-top: 30px; 
            border-top: 1px solid rgba(255,255,255,0.1); 
        }

        .info-card { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            color: var(--text-color); 
            text-decoration: none; 
            padding: 15px 25px; 
            background: rgba(255,255,255,0.03); 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .info-card:hover { 
            border-color: var(--accent-color); 
            background: rgba(145, 94, 255, 0.05); 
            transform: translateY(-3px); 
        }

        .info-card i { font-size: 24px; color: var(--accent-color); }
        .info-card div { display: flex; flex-direction: column; }
        .info-card span { font-size: 12px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .info-card strong { font-size: 15px; font-weight: 500; }

        @media (max-width: 768px) { 
            .contact-container { padding: 30px 20px; }
            .contact-header h1 { font-size: 35px; }
            .contact-info-blocks { flex-direction: column; gap: 15px; align-items: stretch; }
            .info-card { justify-content: center; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-outline" id="cursor-outline"></div>

    <nav>
        <a href="index.html" class="logo"><span>S</span> Sankalp</a>
        
        <button class="hamburger" id="hamburger-btn">
            <i class="fas fa-bars"></i>
        </button>

        <div class="nav-links" id="nav-links">
            <a href="index.html">Home</a>
            <a href="automation.html">Automation Scripts</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html" class="active-link">Contact</a>
        </div>
        
        <button id="theme-toggle"><i class="fas fa-sun"></i></button>
    </nav>

    <div class="page-wrapper">
        <div class="contact-container">
            
            <div class="contact-header">
                <h1>Let's <span>Connect</span></h1>
                <p>Have a question or want to work together? Drop me a message below.</p>
            </div>
            
            <form action="https://formspree.io/f/xvzvkaga" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="How can I help you with your infrastructure?" required></textarea>
                </div>
                
                <button type="submit">
                    Send Message <i class="fas fa-paper-plane"></i>
                </button>
            </form>

            <div class="contact-info-blocks">
                <a href="mailto:sinha.sankalp@hotmail.com" class="info-card">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <span>Email Me</span>
                        <strong>sinha.sankalp@hotmail.com</strong>
                    </div>
                </a>
                
                <a href="https://www.linkedin.com/in/sankalpsinha21" target="_blank" class="info-card">
                    <i class="fab fa-linkedin"></i>
                    <div>
                        <span>Connect</span>
                        <strong>LinkedIn Profile</strong>
                    </div>
                </a>
            </div>

        </div>
    </div>

    <script>
        // --- MOBILE HAMBURGER MENU LOGIC ---
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const navLinksMenu = document.getElementById('nav-links');
        const hamburgerIcon = hamburgerBtn.querySelector('i');

        hamburgerBtn.addEventListener('click', () => {
            navLinksMenu.classList.toggle('active');
            if (navLinksMenu.classList.contains('active')) {
                hamburgerIcon.classList.remove('fa-bars');
                hamburgerIcon.classList.add('fa-times');
            } else {
                hamburgerIcon.classList.remove('fa-times');
                hamburgerIcon.classList.add('fa-bars');
            }
        });

        // --- CUSTOM CURSOR LOGIC ---
        const dot = document.getElementById('cursor-dot');
        const outline = document.getElementById('cursor-outline');

        if (window.matchMedia("(pointer: fine)").matches) {
            window.addEventListener('mousemove', (e) => {
                const posX = e.clientX;
                const posY = e.clientY;
                dot.style.left = `${posX}px`;
                dot.style.top = `${posY}px`;
                outline.animate({ left: `${posX}px`, top: `${posY}px` }, { duration: 200, fill: "forwards" });
            });

            document.querySelectorAll('a, button, input, textarea, .hamburger').forEach(el => {
                el.addEventListener('mouseenter', () => {
                    outline.style.width = '60px'; outline.style.height = '60px'; outline.style.backgroundColor = 'rgba(145, 94, 255, 0.1)';
                });
                el.addEventListener('mouseleave', () => {
                    outline.style.width = '40px'; outline.style.height = '40px'; outline.style.backgroundColor = 'transparent';
                });
            });
        }

        // --- THEME PERSISTENCE & 3D BACKGROUND ---
        const htmlElement = document.documentElement;
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = themeToggle.querySelector('i');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        
        htmlElement.setAttribute('data-theme', savedTheme);
        themeIcon.className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';

        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const geometry = new THREE.BufferGeometry();
        const particlesCount = window.innerWidth < 768 ? 300 : 800; 
        const posArray = new Float32Array(particlesCount * 3);
        for(let i = 0; i < particlesCount * 3; i++) { posArray[i] = (Math.random() - 0.5) * 15; }
        geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        let material = new THREE.PointsMaterial({
            size: 0.015, color: savedTheme === 'dark' ? 0x915eff : 0x0078d4, transparent: true, opacity: 0.6
        });

        const particlesMesh = new THREE.Points(geometry, material);
        scene.add(particlesMesh);
        camera.position.z = 3;

        themeToggle.addEventListener('click', () => {
            const newTheme = htmlElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeIcon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            material.color.setHex(newTheme === 'dark' ? 0x915eff : 0x0078d4); 
        });

        let mouseX = 0; let mouseY = 0;
        document.addEventListener('mousemove', (e) => { mouseX = e.clientX / window.innerWidth - 0.5; mouseY = e.clientY / window.innerHeight - 0.5; });

        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.0005; particlesMesh.rotation.x += 0.0002;
            if (window.matchMedia("(pointer: fine)").matches) { particlesMesh.rotation.y += mouseX * 0.005; particlesMesh.rotation.x += mouseY * 0.005; }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
