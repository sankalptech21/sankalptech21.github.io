<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sankalp Sinha | Automation Scripts</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        /* --- CORE STYLES & THEME VARIABLES --- */
        :root {
            --bg-color: #050816;
            --text-color: #ffffff;
            --text-secondary: #dfd9ff;
            --accent-color: #915eff; 
            --card-bg: rgba(21, 16, 48, 0.85);
            --nav-bg: rgba(5, 8, 22, 0.9);
            
            /* Category Colors */
            --cat-teams: #7b61ff;
            --cat-email: #0078d4;
            --cat-sharepoint: #00a4a6;
            --cat-security: #28a745;
            --cat-report: #ffb900;
        }

        [data-theme="light"] {
            --bg-color: #f3f3f3;
            --text-color: #1a1a1a;
            --text-secondary: #4a4a4a;
            --accent-color: #0078d4; 
            --card-bg: rgba(255, 255, 255, 0.9);
            --nav-bg: rgba(255, 255, 255, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: background-color 0.3s, color 0.3s; cursor: none; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; min-height: 100vh; }

        /* --- 3D CANVAS & CURSOR --- */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        .cursor-dot { width: 8px; height: 8px; background-color: var(--accent-color); position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); box-shadow: 0 0 10px var(--accent-color); }
        .cursor-outline { width: 40px; height: 40px; border: 2px solid var(--accent-color); position: fixed; border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: width 0.15s, height 0.15s; }
        @media (max-width: 768px) { .cursor-dot, .cursor-outline { display: none; } * { cursor: auto; } }

        /* --- NAVBAR --- */
        nav { position: fixed; top: 0; width: 100%; padding: 20px 50px; display: flex; align-items: center; justify-content: center; background: var(--nav-bg); backdrop-filter: blur(10px); z-index: 1000; }
        .logo { position: absolute; left: 50px; font-size: 22px; font-weight: 700; color: var(--text-color); text-decoration: none; display: flex; align-items: center; gap: 10px; z-index: 1001; }
        .logo span { color: var(--accent-color); }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 16px; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--text-color); }
        .active-link { color: var(--text-color) !important; border-bottom: 2px solid var(--accent-color); padding-bottom: 5px; }
        #theme-toggle { position: absolute; right: 50px; background: none; border: none; color: var(--text-color); font-size: 22px; cursor: pointer; z-index: 1001; }
        .hamburger { display: none; background: none; border: none; color: var(--text-color); font-size: 24px; cursor: pointer; position: absolute; right: 90px; z-index: 1001; }

        @media (max-width: 768px) {
            nav { padding: 15px 20px; justify-content: space-between; }
            .logo { left: 20px; font-size: 18px; }
            #theme-toggle { right: 20px; }
            .hamburger { display: block; right: 65px; }
            .nav-links { position: absolute; top: 100%; left: 0; width: 100%; background: var(--nav-bg); backdrop-filter: blur(15px); flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; transform: translateY(-150%); opacity: 0; transition: 0.4s ease-in-out; pointer-events: none; border-bottom: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
            .nav-links.active { transform: translateY(0); opacity: 1; pointer-events: auto; }
        }

        /* --- PAGE HEADER & SEARCH --- */
        .page-header { padding: 130px 10% 30px 10%; text-align: center; max-width: 1200px; margin: 0 auto; }
        .page-header h1 { font-size: 45px; font-weight: 900; margin-bottom: 15px; }
        .page-header h1 span { color: var(--accent-color); }
        
        /* Search Bar */
        .search-container { max-width: 600px; margin: 30px auto 10px auto; position: relative; }
        .search-container input { width: 100%; padding: 15px 20px 15px 50px; font-size: 16px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; color: var(--text-color); outline: none; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.1); font-family: 'Poppins', sans-serif; }
        .search-container input:focus { border-color: var(--accent-color); box-shadow: 0 5px 20px rgba(145, 94, 255, 0.3); }
        .search-container i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 18px; }
        
        #results-count { color: var(--text-secondary); font-size: 14px; margin-top: 10px; display: block; }

        @media (max-width: 768px) { .page-header { padding: 100px 5% 20px 5%; } .page-header h1 { font-size: 32px; } }

        /* --- SCRIPT GRID --- */
        .scripts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto 100px auto; padding: 0 5%; }
        
        .script-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; transform-style: preserve-3d; box-shadow: 0 5px 15px rgba(0,0,0,0.15); backdrop-filter: blur(10px); transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .script-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.2); }
        
        /* Dynamic Category Accent Bar */
        .card-accent { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--accent-color); }

        .script-icon-container { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; transform: translateZ(20px); }
        .script-icon-container i { font-size: 24px; color: var(--accent-color); }
        .script-category { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; color: var(--text-secondary); background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px; }

        .script-card h3 { color: var(--text-color); font-size: 16px; margin-bottom: 0; transform: translateZ(20px); font-weight: 600; line-height: 1.4; flex-grow: 1; }
        
        @media (max-width: 768px) { .scripts-grid { grid-template-columns: 1fr; } }

        /* --- BLACK CODING MODAL --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); backdrop-filter: blur(8px); justify-content: center; align-items: center; padding: 20px; }
        
        .code-modal-content { background: #111111; border: 1px solid #333; width: 100%; max-width: 900px; height: 85vh; border-radius: 12px; box-shadow: 0 25px 50px rgba(0,0,0,0.8); display: flex; flex-direction: column; overflow: hidden; animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes modalPop { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .terminal-header { background: #1e1e1e; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .terminal-title { color: #cccccc; font-size: 15px; font-family: monospace; display: flex; align-items: center; gap: 10px; }
        .terminal-title i { color: #569cd6; } 
        
        .terminal-controls { display: flex; gap: 15px; align-items: center; }
        .copy-btn { background: #2d2d2d; color: #cccccc; border: 1px solid #444; padding: 6px 15px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; font-family: 'Poppins', sans-serif; }
        .copy-btn:hover { background: #3d3d3d; color: #fff; border-color: #666; }
        .copy-btn.copied { background: #28a745; color: #fff; border-color: #28a745; }

        .close-btn { color: #888; font-size: 24px; cursor: pointer; transition: 0.2s; line-height: 1; }
        .close-btn:hover { color: #ff5f56; }

        .code-container { padding: 20px; overflow-y: auto; background: #111111; flex-grow: 1; }
        .code-container::-webkit-scrollbar { width: 10px; height: 10px; }
        .code-container::-webkit-scrollbar-track { background: #1e1e1e; }
        .code-container::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; }
        .code-container::-webkit-scrollbar-thumb:hover { background: #555; }

        pre { margin: 0; font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; line-height: 1.6; color: #d4d4d4; white-space: pre-wrap; word-wrap: break-word; }
        
        /* Loading animation inside terminal */
        .loader { color: #569cd6; font-family: monospace; font-size: 16px; display: flex; align-items: center; gap: 10px; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-left-color: #569cd6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) { .modal { padding: 10px; } .code-modal-content { height: 90vh; border-radius: 8px; } .terminal-header { padding: 10px 15px; flex-wrap: wrap; gap: 10px; } .terminal-title { font-size: 13px; width: 100%; border-bottom: 1px solid #333; padding-bottom: 10px; } .terminal-controls { width: 100%; justify-content: space-between; } pre { font-size: 12px; } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-outline" id="cursor-outline"></div>

    <nav>
        <a href="index.html" class="logo"><span>S</span> Sankalp</a>
        <button class="hamburger" id="hamburger-btn"><i class="fas fa-bars"></i></button>
        <div class="nav-links" id="nav-links">
            <a href="index.html">Home</a>
            <a href="automation.html" class="active-link">Automation Scripts</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html">Contact</a>
        </div>
        <button id="theme-toggle"><i class="fas fa-sun"></i></button>
    </nav>

    <div class="page-header">
        <h1>PowerShell <span>Library</span></h1>
        
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search for a script (e.g., 'Mailbox', 'Azure', 'Audit')...">
            <span id="results-count">Loading scripts...</span>
        </div>
    </div>

    <section class="scripts-grid" id="scripts-container">
        </section>

    <div id="codeModal" class="modal">
        <div class="code-modal-content">
            <div class="terminal-header">
                <div class="terminal-title">
                    <i class="fas fa-file-code"></i> <span id="modal-script-name">script.ps1</span>
                </div>
                <div class="terminal-controls">
                    <button class="copy-btn" id="copyBtn"><i class="far fa-copy"></i> Copy Code</button>
                    <span class="close-btn" id="closeModalBtn">&times;</span>
                </div>
            </div>
            <div class="code-container">
                <pre><code id="modal-code-content"></code></pre>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // SCRIPT MASTER LIST
        // Add new scripts here. Ensure the 'filename' EXACTLY matches the file in your /scripts/ folder.
        // ==========================================
        const rawScripts = [
            "Discovered Apps using Intune",
            "Anonymous Link Activity Report",
            "Archive Mailbox Size Report",
            "Audit Email Deletion in Office 365",
            "Audit External User Activity",
            "Audit File Access in SPO",
            "Audit File Deletion",
            "Audit File Downloads in SPO",
            "Audit Group Membership Changes",
            "Audit M365 Admins Activities",
            "Audit M365 User Creations",
            "Audit MS Teams Channel Creations",
            "Audit MS Teams Membership Changes",
            "Audit Mailbox Permission Changes",
            "Audit Office 365 External Sharing Activity",
            "Audit Office 365 User Activity Report",
            "Audit Recently Created M365 Users",
            "Audit SPO Group Membership Changes",
            "Audit Send As emails",
            "Audit Teams meetings",
            "Automate M365 User Offboarding",
            "Automate Outlook Signature - Deploy Once and Forget It",
            "Azure AD Devices Report",
            "Check Per-user MFA Status using MS Graph",
            "Configure Email Signature in Outlook",
            "Connect MS Graph with Certificate-Automate Azure app registration",
            "Connect Microsoft Graph PowerShell",
            "Connect to All Office 365 Services PowerShell Script",
            "Connect to Exchange Online PowerShell script",
            "Convert DL to M365 Groups",
            "Convert User Mailboxes to Shared Mailboxes in Bulk",
            "Delete Older Emails in Outlook",
            "Disable Self-service Purchase in M365",
            "Enable MFA for Admin Users",
            "Enable Mailbox Auditing for Office 365 Users",
            "Export CA policies",
            "Export Entra Sign-in Logs",
            "Export MFA Status Report using MS Graph",
            "Export Mailbox Hold Details",
            "Export Non-audited Mailbox Actions",
            "Export Office 365 Groups a User is Member Of",
            "Export OneDrive Urls and Usage Size",
            "Export SharePoint Online External Users report",
            "Export Shared channel members report",
            "External Warning Rule for External Emails",
            "Find Expired Anyone (Anonymous) links",
            "Find Inactive Distribution Lists",
            "Find Inbox Rules that Forwards Email Externally",
            "Find M365 User License Assignment Path",
            "Find Orphaned Teams",
            "Find Teams Meetings Attended By a Specific User",
            "Find who Sent Emails from Shared Mailboxes",
            "Get All Office 365 Email Addresses",
            "Get All Subsites in SPO",
            "Get Calendar Permission Report",
            "Get DLs a User is Member Of"
        ];

        // --- AUTO-CATEGORIZER LOGIC ---
        // Converts the raw text list into formatted objects with proper icons and filenames.
        const scriptsData = rawScripts.map(title => {
            let cat = "General"; let icon = "fa-file-code"; let color = "var(--accent-color)";
            let titleLower = title.toLowerCase();

            if (titleLower.includes("teams")) { cat = "Teams"; icon = "fa-users"; color = "var(--cat-teams)"; }
            else if (titleLower.includes("mailbox") || titleLower.includes("email") || titleLower.includes("outlook") || titleLower.includes("exchange")) { cat = "Exchange"; icon = "fa-envelope"; color = "var(--cat-email)"; }
            else if (titleLower.includes("spo") || titleLower.includes("sharepoint") || titleLower.includes("onedrive")) { cat = "SharePoint"; icon = "fa-project-diagram"; color = "var(--cat-sharepoint)"; }
            else if (titleLower.includes("azure") || titleLower.includes("entra") || titleLower.includes("mfa") || titleLower.includes("password") || titleLower.includes("sign-in")) { cat = "Identity"; icon = "fa-shield-alt"; color = "var(--cat-security)"; }
            else if (titleLower.includes("audit") || titleLower.includes("report") || titleLower.includes("log")) { cat = "Audit & Report"; icon = "fa-chart-bar"; color = "var(--cat-report)"; }
            else if (titleLower.includes("intune")) { cat = "Endpoint"; icon = "fa-mobile-alt"; color = "var(--cat-security)"; }

            // Generates a clean filename (e.g. "Audit Teams meetings" -> "Audit-Teams-meetings.ps1")
            let filename = title.replace(/[^a-zA-Z0-9 ]/g, "").replace(/\s+/g, "-") + ".ps1";

            return { title, category: cat, icon, color, filename };
        });

        // --- RENDER GRID CONTAINERS ---
        const gridContainer = document.getElementById('scripts-container');
        const searchInput = document.getElementById('searchInput');
        const resultsCount = document.getElementById('results-count');

        function renderScripts(filterText = "") {
            gridContainer.innerHTML = "";
            let count = 0;

            scriptsData.forEach(script => {
                if (script.title.toLowerCase().includes(filterText.toLowerCase()) || script.category.toLowerCase().includes(filterText.toLowerCase())) {
                    count++;
                    const card = document.createElement('div');
                    card.className = 'script-card';
                    
                    if (window.matchMedia("(min-width: 1025px)").matches) {
                        card.setAttribute('data-tilt', '');
                        card.setAttribute('data-tilt-max', '10');
                        card.setAttribute('data-tilt-speed', '400');
                    }
                    
                    card.innerHTML = `
                        <div class="card-accent" style="background: ${script.color}"></div>
                        <div class="script-icon-container">
                            <i class="fas ${script.icon}" style="color: ${script.color}"></i>
                            <span class="script-category">${script.category}</span>
                        </div>
                        <h3>${script.title}</h3>
                    `;
                    
                    card.addEventListener('click', () => openModal(script));
                    gridContainer.appendChild(card);
                }
            });

            resultsCount.innerText = `Showing ${count} scripts`;
            
            // Re-initialize tilt for new elements
            if (window.matchMedia("(min-width: 1025px)").matches && count > 0) {
                VanillaTilt.init(document.querySelectorAll(".script-card"));
            }
        }

        // Initialize grid
        renderScripts();

        // Search Event Listener
        searchInput.addEventListener('input', (e) => {
            renderScripts(e.target.value);
        });

        // --- MODAL & FETCH LOGIC ---
        const modal = document.getElementById('codeModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const copyBtn = document.getElementById('copyBtn');
        const modalTitle = document.getElementById('modal-script-name');
        const modalCode = document.getElementById('modal-code-content');
        
        let currentRawCode = ""; 

        // 🟢 THIS IS THE FUNCTION THAT READS THE SEPARATE .PS1 FILES
        async function openModal(script) {
            modalTitle.innerText = script.filename;
            
            // Show loading spinner
            modalCode.innerHTML = `<div class="loader"><div class="spinner"></div> Fetching script from repository...</div>`;
            copyBtn.style.display = "none"; // Hide copy button while loading
            
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            try {
                // IMPORTANT: This fetches the file from the /scripts/ folder in your repo
                const response = await fetch(`scripts/${script.filename}`);
                
                if (!response.ok) {
                    throw new Error("File not found");
                }
                
                const text = await response.text();
                currentRawCode = text; 
                
                // Escape HTML so code renders properly without breaking the webpage
                const escapedText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                modalCode.innerHTML = escapedText;
                
                copyBtn.style.display = "flex"; // Show copy button
                copyBtn.innerHTML = '<i class="far fa-copy"></i> Copy Code';
                copyBtn.classList.remove('copied');

            } catch (error) {
                // What happens if you haven't uploaded the .ps1 file yet
                modalCode.innerHTML = `
                    <span style="color: #ff5f56; font-size: 16px;">
                        <i class="fas fa-exclamation-triangle"></i> Script file not found.
                    </span>
                    <br><br>
                    <span style="color: #888;">Ensure you have uploaded a file named:</span>
                    <br>
                    <strong style="color: #ccc;">scripts/${script.filename}</strong>
                    <br><br>
                    <span style="color: #888;">to your GitHub repository.</span>
                `;
                currentRawCode = "";
                copyBtn.style.display = "none";
            }
        }

        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto'; 
        }

        closeModalBtn.addEventListener('click', closeModal);
        window.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

        copyBtn.addEventListener('click', () => {
            if (!currentRawCode) return;
            navigator.clipboard.writeText(currentRawCode).then(() => {
                copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.innerHTML = '<i class="far fa-copy"></i> Copy Code';
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
        });

        // --- MOBILE HAMBURGER MENU LOGIC ---
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const navLinksMenu = document.getElementById('nav-links');
        const hamburgerIcon = hamburgerBtn.querySelector('i');

        hamburgerBtn.addEventListener('click', () => {
            navLinksMenu.classList.toggle('active');
            if (navLinksMenu.classList.contains('active')) {
                hamburgerIcon.classList.remove('fa-bars');
                hamburgerIcon.classList.add('fa-times');
            } else {
                hamburgerIcon.classList.remove('fa-times');
                hamburgerIcon.classList.add('fa-bars');
            }
        });

        // --- CUSTOM CURSOR LOGIC ---
        const dot = document.getElementById('cursor-dot');
        const outline = document.getElementById('cursor-outline');

        if (window.matchMedia("(pointer: fine)").matches) {
            window.addEventListener('mousemove', (e) => {
                const posX = e.clientX;
                const posY = e.clientY;
                dot.style.left = `${posX}px`;
                dot.style.top = `${posY}px`;
                outline.animate({ left: `${posX}px`, top: `${posY}px` }, { duration: 200, fill: "forwards" });
            });

            const observer = new MutationObserver(() => {
                document.querySelectorAll('a, button, .script-card, .close-btn, .hamburger').forEach(el => {
                    el.addEventListener('mouseenter', () => {
                        outline.style.width = '60px'; outline.style.height = '60px'; outline.style.backgroundColor = 'rgba(145, 94, 255, 0.1)';
                    });
                    el.addEventListener('mouseleave', () => {
                        outline.style.width = '40px'; outline.style.height = '40px'; outline.style.backgroundColor = 'transparent';
                    });
                });
            });
            observer.observe(document.body, { childList: true, subtree: true });
        }

        // --- THEME PERSISTENCE & 3D BACKGROUND ---
        const htmlElement = document.documentElement;
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = themeToggle.querySelector('i');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        
        htmlElement.setAttribute('data-theme', savedTheme);
        themeIcon.className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';

        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const geometry = new THREE.BufferGeometry();
        const particlesCount = window.innerWidth < 768 ? 300 : 800; 
        const posArray = new Float32Array(particlesCount * 3);
        for(let i = 0; i < particlesCount * 3; i++) { posArray[i] = (Math.random() - 0.5) * 15; }
        geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        let material = new THREE.PointsMaterial({
            size: 0.015, color: savedTheme === 'dark' ? 0x915eff : 0x0078d4, transparent: true, opacity: 0.6
        });

        const particlesMesh = new THREE.Points(geometry, material);
        scene.add(particlesMesh);
        camera.position.z = 3;

        themeToggle.addEventListener('click', () => {
            const newTheme = htmlElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeIcon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            material.color.setHex(newTheme === 'dark' ? 0x915eff : 0x0078d4); 
        });

        let mouseX = 0; let mouseY = 0;
        document.addEventListener('mousemove', (e) => { mouseX = e.clientX / window.innerWidth - 0.5; mouseY = e.clientY / window.innerHeight - 0.5; });

        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.0005; particlesMesh.rotation.x += 0.0002;
            if (window.matchMedia("(pointer: fine)").matches) { particlesMesh.rotation.y += mouseX * 0.005; particlesMesh.rotation.x += mouseY * 0.005; }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
